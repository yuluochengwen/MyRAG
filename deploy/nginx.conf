server {
    listen 80;
    server_name localhost;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        index pages/knowledge-base.html;
        try_files $uri $uri/ /pages/knowledge-base.html;
    }

    # 静态资源（CSS、JS、图片）
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 页面路由
    location ~ ^/(agent|chat|knowledge-base|model-management|intelligent-assistant|lora-training) {
        root /usr/share/nginx/html;
        try_files /pages/$uri.html /pages/$uri.html;
    }

    # 后端API代理
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket支持
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # 健康检查
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # 错误页面
    error_page 404 /pages/404.html;
    error_page 500 502 503 504 /pages/50x.html;
}
