version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: myrag-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myrag}
      MYSQL_USER: ${MYSQL_USER:-myrag}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-myrag123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
      - --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myrag-network

  # Ollama服务
  ollama:
    image: ollama/ollama:latest
    container_name: myrag-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - myrag-network
    # GPU支持（取消注释以启用）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Neo4j图数据库
  neo4j:
    image: neo4j:5.15-community
    container_name: myrag-neo4j
    restart: always
    ports:
      - "7474:7474"  # HTTP UI
      - "7687:7687"  # Bolt协议
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-myrag123}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
      - NEO4J_db_logs_query_enabled=INFO
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - myrag-network

  # FastAPI后端
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: myrag-backend
    restart: on-failure:5
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./Backend:/app:cached
      - ./data/knowledge_base:/app/data/knowledge_base
      - ./Models:/app/Models
      - ./data/vector_db:/app/data/vector_db
      - ./data/logs:/app/data/logs
    environment:
      - PROJECT_ROOT=/app
      - APP_ENV=${APP_ENV:-development}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-myrag}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-myrag123}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-myrag}
      - OLLAMA_BASE_URL=http://ollama:11434
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-myrag123}
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - myrag-network

  # Nginx前端服务器
  nginx:
    image: nginx:alpine
    container_name: myrag-nginx
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./Frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - myrag-network

volumes:
  mysql_data:
    driver: local
  ollama_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  myrag-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
