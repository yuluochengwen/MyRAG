<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoRA 微调训练 - RAGFlow.ai</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" onerror="this.onerror=null;this.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css';">
  <!-- 引入Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- 引入自定义样式 -->
  <link rel="stylesheet" href="css/lora-training.css">
  
  <!-- 引入公共脚本 -->
  <script src="js/common.js" defer></script>
  <!-- 引入LoRA训练脚本 -->
  <script src="js/lora-training.js" defer></script>
  
  <!-- Tailwind配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            secondary: '#69B1FF',
            accent: '#36CFC9',
            dark: '#1D2129',
            light: '#F2F3F5',
            danger: '#F53F3F',
            warning: '#FF7D00',
            success: '#00B42A'
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
</head>
<body class="font-inter bg-gray-50 text-dark min-h-screen flex flex-col">
  <!-- 顶部导航栏 -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-4">
      <div class="flex justify-between items-center py-4">
        <!-- Logo -->
        <div class="flex items-center space-x-2">
          <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center">
            <i class="fa fa-link text-white text-xl"></i>
          </div>
          <span class="text-xl font-bold text-primary">RAGFlow<span class="text-dark">.ai</span></span>
        </div>
        
        <!-- 导航链接 - 桌面版 -->
        <nav class="hidden md:flex items-center space-x-1">
          <a href="knowledge-base.html" class="nav-link px-4 py-2 font-medium border-b-2 border-transparent hover:border-primary hover:text-primary transition-custom">知识库</a>
          <a href="intelligent-assistant.html" class="nav-link px-4 py-2 font-medium border-b-2 border-transparent hover:border-primary hover:text-primary transition-custom">智能助手</a>
          <a href="agent-demo.html" class="nav-link px-4 py-2 font-medium border-b-2 border-transparent hover:border-primary hover:text-primary transition-custom">Agent</a>
          <a href="model-management.html" class="nav-link px-4 py-2 font-medium border-b-2 border-transparent hover:border-primary hover:text-primary transition-custom">模型管理</a>
        </nav>
        
        <!-- 用户区域 -->
        <div class="flex items-center space-x-4">
          <button class="p-2 rounded-full hover:bg-gray-100 transition-custom relative">
            <i class="fa fa-bell-o text-gray-600"></i>
            <span class="absolute top-1 right-1 w-2 h-2 bg-danger rounded-full"></span>
          </button>
          <div class="flex items-center space-x-2">
            <img src="https://picsum.photos/id/1005/40/40" alt="用户头像" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-sm">
            <span class="hidden md:inline font-medium">管理员</span>
          </div>
          <!-- 移动端菜单按钮 -->
          <button class="md:hidden p-2 rounded-md hover:bg-gray-100 transition-custom" id="mobile-menu-btn">
            <i class="fa fa-bars text-gray-600"></i>
          </button>
        </div>
      </div>
      
      <!-- 移动端导航菜单 -->
      <div class="md:hidden hidden pb-4" id="mobile-menu">
        <nav class="flex flex-col space-y-2">
          <a href="knowledge-base.html" class="mobile-nav-link px-4 py-3 font-medium hover:bg-gray-100 rounded-lg transition-custom">知识库</a>
          <a href="intelligent-assistant.html" class="mobile-nav-link px-4 py-3 font-medium hover:bg-gray-100 rounded-lg transition-custom">智能助手</a>
          <a href="agent-demo.html" class="mobile-nav-link px-4 py-3 font-medium hover:bg-gray-100 rounded-lg transition-custom">Agent</a>
          <a href="model-management.html" class="mobile-nav-link px-4 py-3 font-medium hover:bg-gray-100 rounded-lg transition-custom">模型管理</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- 主内容区域 -->
  <main class="flex-grow container mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-6">
      <div class="flex items-center space-x-3">
        <a href="model-management.html" class="text-gray-500 hover:text-primary transition-custom">
          <i class="fa fa-arrow-left text-xl"></i>
        </a>
        <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold">LoRA 微调训练</h1>
      </div>
    </div>
    
    <!-- 训练配置表单 -->
    <div id="training-config-section" class="max-w-4xl mx-auto">
      <div class="bg-white rounded-xl card-shadow p-6">
        <h2 class="text-xl font-bold mb-6">训练配置</h2>
        
        <form id="training-form" class="space-y-6">
          <!-- 基座模型选择 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              基座模型 <span class="text-danger">*</span>
            </label>
            <select id="base-model-select" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
              <option value="">选择基座模型...</option>
            </select>
            <p class="mt-1 text-xs text-gray-500">选择用于微调的基座 LLM 模型</p>
          </div>
          
          <!-- 训练数据上传 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              训练数据 <span class="text-danger">*</span>
            </label>
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-primary transition-custom cursor-pointer" id="upload-area">
              <input type="file" id="dataset-file" accept=".json" class="hidden" required>
              <i class="fa fa-cloud-upload text-4xl text-gray-400 mb-2"></i>
              <p class="text-gray-600 mb-1">点击上传或拖拽文件到此处</p>
              <p class="text-xs text-gray-500">支持 JSON 格式（Alpaca 或 Conversation）</p>
            </div>
            <div id="file-info" class="hidden mt-2 p-3 bg-blue-50 border border-blue-200 rounded-lg">
              <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2">
                  <i class="fa fa-file-text-o text-blue-600"></i>
                  <span id="file-name" class="text-sm text-blue-800"></span>
                </div>
                <button type="button" id="remove-file-btn" class="text-danger hover:text-danger/80">
                  <i class="fa fa-times"></i>
                </button>
              </div>
              <div id="validation-result" class="mt-2 text-sm"></div>
            </div>
          </div>
          
          <!-- 训练模式选择 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              训练模式 <span class="text-danger">*</span>
            </label>
            <div class="flex space-x-4">
              <label class="flex items-center space-x-2 cursor-pointer">
                <input type="radio" name="training-mode" value="qlora" checked class="w-4 h-4 text-primary focus:ring-primary">
                <span>QLoRA（推荐，低显存）</span>
              </label>
              <label class="flex items-center space-x-2 cursor-pointer">
                <input type="radio" name="training-mode" value="lora" class="w-4 h-4 text-primary focus:ring-primary">
                <span>LoRA（标准）</span>
              </label>
            </div>
            <p class="mt-1 text-xs text-gray-500">QLoRA 使用 4-bit 量化，显存占用更低</p>
          </div>
          
          <!-- LoRA 权重名称 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              LoRA 权重名称 <span class="text-danger">*</span>
            </label>
            <input type="text" id="lora-name" required placeholder="例如：my-lora-model" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
            <p class="mt-1 text-xs text-gray-500">用于标识此 LoRA 权重的名称</p>
          </div>
          
          <!-- 基础参数 -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">LoRA Rank</label>
              <input type="number" id="lora-rank" value="8" min="1" max="256" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">LoRA Alpha</label>
              <input type="number" id="lora-alpha" value="16" min="1" max="512" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Dropout</label>
              <input type="number" id="lora-dropout" value="0.05" min="0" max="1" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">学习率</label>
              <input type="number" id="learning-rate" value="0.0002" min="0" step="0.00001" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Batch Size</label>
              <input type="number" id="batch-size" value="4" min="1" max="128" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Epochs</label>
              <input type="number" id="epochs" value="3" min="1" max="100" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
            </div>
          </div>
          
          <!-- 高级参数（折叠面板） -->
          <div class="border border-gray-200 rounded-lg">
            <button type="button" id="advanced-toggle" class="w-full px-4 py-3 flex items-center justify-between hover:bg-gray-50 transition-custom">
              <span class="font-medium">高级参数</span>
              <i class="fa fa-chevron-down transition-transform" id="advanced-icon"></i>
            </button>
            <div id="advanced-params" class="hidden px-4 pb-4 space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">最大序列长度</label>
                <input type="number" id="max-seq-length" value="512" min="128" max="4096" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">描述（可选）</label>
                <textarea id="lora-description" rows="3" placeholder="描述此 LoRA 模型的用途..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"></textarea>
              </div>
            </div>
          </div>
          
          <!-- 提交按钮 -->
          <div class="flex space-x-3">
            <button type="submit" id="submit-btn" class="flex-1 px-6 py-3 bg-primary text-white rounded-lg hover:bg-primary/90 transition-custom font-medium disabled:opacity-50 disabled:cursor-not-allowed">
              <i class="fa fa-rocket mr-2"></i>开始训练
            </button>
            <button type="button" onclick="window.location.href='model-management.html'" class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-custom">
              取消
            </button>
          </div>
        </form>
      </div>
    </div>
    
    <!-- 训练进度显示区域 -->
    <div id="training-progress-section" class="hidden max-w-6xl mx-auto">
      <div class="bg-white rounded-xl card-shadow p-6 mb-6">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-bold">训练进度</h2>
          <button id="cancel-training-btn" class="px-4 py-2 border border-danger text-danger rounded-lg hover:bg-danger/5 transition-custom">
            <i class="fa fa-stop mr-2"></i>取消训练
          </button>
        </div>
        
        <!-- 进度条 -->
        <div class="mb-6">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-medium text-gray-700">总体进度</span>
            <span id="progress-percentage" class="text-sm font-medium text-primary">0%</span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-3">
            <div id="progress-bar" class="bg-primary h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
          </div>
          <div class="flex items-center justify-between mt-2 text-xs text-gray-500">
            <span id="current-step">Epoch 0/0 - Step 0/0</span>
            <span id="eta">预计剩余: --</span>
          </div>
        </div>
        
        <!-- Loss 曲线图 -->
        <div class="mb-6">
          <h3 class="text-sm font-medium text-gray-700 mb-3">Loss 曲线</h3>
          <div class="bg-gray-50 rounded-lg p-4">
            <canvas id="loss-chart" height="80"></canvas>
          </div>
        </div>
        
        <!-- 实时日志 -->
        <div>
          <h3 class="text-sm font-medium text-gray-700 mb-3">训练日志</h3>
          <div id="training-logs" class="bg-gray-900 text-green-400 rounded-lg p-4 h-64 overflow-y-auto font-mono text-xs">
            <div>等待训练开始...</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
