<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库管理 - RAGFlow.ai</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" onerror="this.onerror=null;this.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css';">
  <!-- 引入D3.js用于知识图谱可视化 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <!-- 引入自定义样式 -->
  <link rel="stylesheet" href="css/knowledge-base.css">
  
  <!-- Tailwind配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            secondary: '#69B1FF',
            accent: '#36CFC9',
            dark: '#1D2129',
            light: '#F2F3F5',
            danger: '#F53F3F',
            warning: '#FF7D00',
            success: '#00B42A'
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
</head>
<body class="font-inter bg-gray-50 text-dark min-h-screen flex flex-col">
  <!-- 顶部导航栏 -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-4">
      <div class="flex justify-between items-center py-4">
        <!-- Logo -->
        <div class="flex items-center space-x-2">
          <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center">
            <i class="fa fa-link text-white text-xl"></i>
          </div>
          <span class="text-xl font-bold text-primary">RAGFlow<span class="text-dark">.ai</span></span>
        </div>
        
        <!-- 导航链接 - 桌面版 -->
        <nav class="hidden md:flex items-center space-x-1">
          <a href="knowledge-base.html" class="nav-link nav-active px-4 py-2 font-medium border-b-2 transition-custom">知识库</a>
          <a href="intelligent-assistant.html" class="nav-link px-4 py-2 font-medium border-b-2 border-transparent hover:border-primary hover:text-primary transition-custom">智能助手</a>
          <a href="agent-demo.html" class="nav-link px-4 py-2 font-medium border-b-2 border-transparent hover:border-primary hover:text-primary transition-custom">Agent</a>
          <a href="model-management.html" class="nav-link px-4 py-2 font-medium border-b-2 border-transparent hover:border-primary hover:text-primary transition-custom">模型管理</a>
        </nav>
        
        <!-- 用户区域 -->
        <div class="flex items-center space-x-4">
          <button class="p-2 rounded-full hover:bg-gray-100 transition-custom relative">
            <i class="fa fa-bell-o text-gray-600"></i>
            <span class="absolute top-1 right-1 w-2 h-2 bg-danger rounded-full"></span>
          </button>
          <div class="flex items-center space-x-2">
            <img src="https://picsum.photos/id/1005/40/40" alt="用户头像" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-sm">
            <span class="hidden md:inline font-medium">管理员</span>
          </div>
          <!-- 移动端菜单按钮 -->
          <button class="md:hidden p-2 rounded-md hover:bg-gray-100 transition-custom" id="mobile-menu-btn">
            <i class="fa fa-bars text-gray-600"></i>
          </button>
        </div>
      </div>
      
      <!-- 移动端导航菜单 -->
      <div class="md:hidden hidden pb-4" id="mobile-menu">
        <nav class="flex flex-col space-y-2">
          <a href="knowledge-base.html" class="mobile-nav-link nav-active px-4 py-3 font-medium bg-primary/5 rounded-lg text-primary transition-custom">知识库</a>
          <a href="intelligent-assistant.html" class="mobile-nav-link px-4 py-3 font-medium hover:bg-gray-100 rounded-lg transition-custom">智能助手</a>
          <a href="agent-demo.html" class="mobile-nav-link px-4 py-3 font-medium hover:bg-gray-100 rounded-lg transition-custom">Agent</a>
          <a href="model-management.html" class="mobile-nav-link px-4 py-3 font-medium hover:bg-gray-100 rounded-lg transition-custom">模型管理</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- 主内容区域 -->
  <main class="flex-grow container mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold">知识库管理</h1>
      <div class="flex space-x-3">
        <div class="relative">
          <input type="text" placeholder="搜索知识库..." class="pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary w-full md:w-64 transition-custom">
          <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
        <button class="btn-filter px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-50 transition-custom">
          <i class="fa fa-filter mr-2 text-gray-600"></i>
          <span class="hidden md:inline">筛选</span>
        </button>
      </div>
    </div>
    
    <!-- 知识库卡片网格 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="kbList">
      <!-- 创建新知识库卡片 -->
      <div class="bg-white rounded-xl p-6 card-shadow hover:shadow-lg transition-custom border-2 border-dashed border-gray-300 hover:border-primary cursor-pointer flex flex-col items-center justify-center text-center group" id="createKBCard">
        <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-4 group-hover:bg-primary/20 transition-custom">
          <i class="fa fa-plus text-primary text-2xl"></i>
        </div>
        <h3 class="text-lg font-bold mb-2">创建知识库</h3>
        <p class="text-gray-500 mb-4">上传文档并创建新的知识库</p>
        <button class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-custom" id="createKBBtn">
          立即创建
        </button>
      </div>
      
      <!-- 动态渲染的知识库卡片将在这里显示 -->
    </div>
  </main>

  <!-- 创建知识库模态框 -->
  <div id="createKBModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-dark">创建新知识库</h2>
        <button id="closeModalBtn" class="p-2 rounded-lg hover:bg-gray-100 transition-custom">
          <i class="fa fa-times text-gray-400 text-xl"></i>
        </button>
      </div>
      
      <form id="createKBForm">
        <div class="mb-6">
          <label for="kbName" class="block text-sm font-medium text-gray-700 mb-2">
            知识库名称 <span class="text-danger">*</span>
          </label>
          <input 
            type="text" 
            id="kbName" 
            name="name"
            required
            maxlength="100"
            placeholder="请输入知识库名称（仅支持中文、英文、数字、下划线和连字符）"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-custom"
          >
          <p class="mt-1 text-xs text-gray-500">1-100个字符</p>
        </div>
        
        <div class="mb-6">
          <label for="kbDescription" class="block text-sm font-medium text-gray-700 mb-2">
            描述信息
          </label>
          <textarea 
            id="kbDescription" 
            name="description"
            rows="3"
            maxlength="500"
            placeholder="请输入知识库描述（可选）"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-custom resize-none"
          ></textarea>
          <p class="mt-1 text-xs text-gray-500">最多500个字符</p>
        </div>
        
        <div class="mb-6">
          <label for="embeddingProvider" class="block text-sm font-medium text-gray-700 mb-2">
            嵌入提供方 <span class="text-danger">*</span>
          </label>
          <select 
            id="embeddingProvider" 
            name="embedding_provider"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-custom"
          >
            <option value="transformers" selected>🤖 Transformers (本地模型)</option>
            <option value="ollama">🦙 Ollama (本地服务)</option>
          </select>
          <p class="mt-1 text-xs text-gray-500">选择嵌入模型的提供方</p>
        </div>
        
        <div class="mb-6">
          <label for="embeddingModel" class="block text-sm font-medium text-gray-700 mb-2">
            嵌入模型 <span class="text-danger">*</span>
          </label>
          <select 
            id="embeddingModel" 
            name="embedding_model"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-custom"
          >
            <option value="">加载中...</option>
          </select>
          <p class="mt-1 text-xs text-gray-500" id="modelHint">根据提供方自动加载可用模型</p>
        </div>
        
        <div class="flex space-x-3">
          <button 
            type="button" 
            id="cancelBtn"
            class="flex-1 px-4 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-custom font-medium"
          >
            取消
          </button>
          <button 
            type="submit" 
            class="flex-1 px-4 py-3 bg-primary text-white rounded-lg hover:bg-primary/90 transition-custom font-medium"
          >
            <i class="fa fa-check mr-2"></i>创建
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- 知识库详情模态框（卡片点击进入） -->
  <div id="kbDetailModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[70] hidden">
    <div class="kb-detail-modal-shell bg-white rounded-2xl w-full mx-3 md:mx-4 shadow-2xl h-[90vh] max-h-[90vh] flex flex-col overflow-hidden">
      <div class="flex justify-between items-center p-4 md:p-6 border-b border-gray-200 kb-detail-header">
        <div>
          <h2 class="text-2xl font-bold text-dark" id="kbDetailTitle">知识库详情</h2>
          <p class="text-sm text-gray-500 mt-1" id="kbDetailSubTitle">正在加载...</p>
        </div>
        <button onclick="closeKBDetailModal()" class="p-2 rounded-lg hover:bg-gray-100 transition-custom">
          <i class="fa fa-times text-gray-400 text-xl"></i>
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-4 md:p-5 kb-detail-backdrop">
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 h-full kb-detail-layout">
          <section class="xl:col-span-2 bg-white rounded-2xl border border-gray-100 card-shadow p-5 flex flex-col min-h-0">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
              <div class="flex items-center space-x-3">
                <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center">
                  <i class="fa fa-sitemap text-primary text-xl"></i>
                </div>
                <div>
                  <h3 class="text-lg font-bold text-dark" id="kbWorkbenchTitle">知识图谱预览</h3>
                  <p class="text-xs text-gray-500" id="kbGraphHint">展示全量实体关系（不含文本块节点）</p>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <button id="kbGraphRefreshBtn" class="px-3 py-2 text-sm rounded-lg border border-gray-300 hover:bg-gray-50 transition-custom">
                  <i class="fa fa-refresh mr-1"></i>刷新
                </button>
              </div>
            </div>

            <div class="kb-detail-tabs mb-4" id="kbDetailTabs">
              <button class="kb-detail-tab active" data-tab="graph"><i class="fa fa-sitemap mr-1"></i>图谱</button>
              <button class="kb-detail-tab" data-tab="files"><i class="fa fa-file-text-o mr-1"></i>文件</button>
              <button class="kb-detail-tab" data-tab="chunks"><i class="fa fa-cubes mr-1"></i>文本块</button>
            </div>

            <div class="kb-workbench-body">
            <div class="kb-tab-panel" id="kbTabPanelGraph">
              <div id="kbGraphViewport" class="kb-graph-viewport rounded-xl border border-gray-100 bg-gradient-to-br from-slate-50 to-blue-50">
                <svg id="kbGraphSvg" class="w-full h-full"></svg>
                <div id="kbGraphEmpty" class="absolute inset-0 flex items-center justify-center text-gray-500 text-sm hidden">
                  暂无可展示图谱数据
                </div>
                <div id="kbGraphLoading" class="absolute inset-0 flex items-center justify-center text-primary text-sm hidden bg-white/70">
                  <i class="fa fa-spinner fa-spin mr-2"></i>图谱加载中
                </div>
              </div>
            </div>

            <div class="kb-tab-panel hidden flex flex-col gap-3" id="kbTabPanelFiles">
              <div id="kbFilePreviewPanel" class="hidden rounded-xl border border-blue-100 bg-blue-50/40 p-3 md:p-4">
                <div class="flex items-start justify-between gap-3 mb-3">
                  <div class="min-w-0">
                    <h4 class="text-sm md:text-base font-bold text-dark truncate" id="kbFilePreviewTitle">文件原文</h4>
                    <p class="text-xs text-gray-500 mt-1" id="kbFilePreviewInfo"></p>
                  </div>
                  <button id="kbFilePreviewCloseBtn" class="px-2.5 py-1.5 text-xs rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100 transition-custom">
                    <i class="fa fa-times mr-1"></i>关闭
                  </button>
                </div>
                <div id="kbFilePreviewBody" class="max-h-64 md:max-h-80 overflow-auto bg-white rounded-lg border border-gray-100 p-3 md:p-4 text-sm">
                  <!-- 动态加载文件内容 -->
                </div>
              </div>
              <div id="kbFilesPanelContent" class="kb-list-panel flex-1 min-h-0"></div>
            </div>

            <div class="kb-tab-panel hidden" id="kbTabPanelChunks">
              <div id="kbChunksPanelContent" class="kb-list-panel"></div>
            </div>
            </div>
          </section>

          <aside class="space-y-4 min-h-0 overflow-y-auto pr-1">
            <section class="bg-white rounded-2xl border border-gray-100 card-shadow p-5">
              <h3 class="text-base font-bold mb-3 text-dark">基础信息</h3>
              <div id="kbDetailMeta" class="space-y-2 text-sm text-gray-700"></div>
            </section>

            <section class="bg-white rounded-2xl border border-gray-100 card-shadow p-5">
              <h3 class="text-base font-bold mb-3 text-dark">图谱统计</h3>
              <div id="kbDetailStats" class="grid grid-cols-2 gap-2"></div>
            </section>

            <section class="bg-white rounded-2xl border border-gray-100 card-shadow p-5">
              <h3 class="text-base font-bold mb-3 text-dark">实体类型 TOP 8</h3>
              <div id="kbEntityTypeList" class="space-y-2 max-h-40 overflow-auto"></div>
            </section>

            <section class="bg-white rounded-2xl border border-gray-100 card-shadow p-5">
              <h3 class="text-base font-bold mb-3 text-dark">节点联动详情</h3>
              <div id="kbEntityInspector" class="text-sm text-gray-600">
                点击图谱节点后，这里会显示实体属性和关联关系。
              </div>
            </section>
          </aside>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 移动端菜单切换
    document.getElementById('mobile-menu-btn')?.addEventListener('click', function() {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });

    // 下拉菜单功能
    document.querySelectorAll('.dropdown button').forEach(button => {
      button.addEventListener('click', function(e) {
        e.stopPropagation();
        const menu = this.nextElementSibling;
        document.querySelectorAll('.dropdown-menu').forEach(m => {
          if (m !== menu) m.classList.add('hidden');
        });
        menu.classList.toggle('hidden');
      });
    });

    document.addEventListener('click', function() {
      document.querySelectorAll('.dropdown-menu').forEach(menu => {
        menu.classList.add('hidden');
      });
    });
  </script>

  <!-- 引入自定义JavaScript -->
  <script src="js/common.js"></script>
  <script src="js/websocket.js"></script>
  <script src="js/knowledge-base.js"></script>
</body>
</html>
