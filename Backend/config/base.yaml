# 基础配置 - 所有环境共享
app:
  name: "MyRAG"
  version: "1.0.0"

file:
  max_size_mb: 100
  total_max_size_mb: 500
  allowed_extensions:
    - .txt
    - .md
    - .pdf
    - .docx
    - .doc
    - .html
    - .json
  upload_dir: "data/knowledge_base"

text_processing:
  chunk_size: 750
  chunk_overlap: 120
  split_profiles:
    text:
      chunk_size: 750
      chunk_overlap: 120
    code:
      chunk_size: 600
      chunk_overlap: 100
    html:
      chunk_size: 700
      chunk_overlap: 120
    json:
      chunk_size: 650
      chunk_overlap: 100
    markdown:
      chunk_size: 700
      chunk_overlap: 120
  hard_sentence_split_enabled: true
  hard_sentence_max_length: 280
  split_quality_monitoring_enabled: true
  split_quality_metrics_file: "data/logs/split_metrics.jsonl"
  separators:
    - "\n\n"
    - "\n"
    - "。"
    - "！"
    - "？"
    - ";"
    - ";"
    - "."
    - " "
  
  semantic_split:
    enabled: false
    max_chunk_size: 800
    min_chunk_size: 200
    ollama_model: "qwen2.5:7b"
    use_for_short_text: true
    short_text_threshold: 5000

vector_db:
  type: "chroma"
  persist_dir: "data/vector_db"
  collection_name_prefix: "kb_"

embedding:
  provider: "transformers"
  default_model: "BERT-Base"
  model_dir: "Models/Embedding"
  batch_size: 32
  max_length: 512
  vector_cache_size: 5000
  enable_e5_prefix: true
  
  ollama:
    base_url: "http://localhost:11434"
    timeout: 120
    default_model: "nomic-embed-text"
    max_workers: 4

logging:
  level: "INFO"
  file: "data/logs/app.log"
  max_bytes: 10485760
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

websocket:
  heartbeat_interval: 30
  max_connections: 100

database:
  pool_size: 10
  max_overflow: 20
  pool_recycle: 3600
  echo: false
